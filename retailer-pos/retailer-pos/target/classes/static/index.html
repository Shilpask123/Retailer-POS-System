<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Retailer POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Retailer POS Management</h2>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search by Name" onkeyup="searchProduct()">

    <!-- Add / Update Form -->
    <div class="card shadow p-4 mb-4">
        <form id="productForm">
            <input type="hidden" id="productId">

            <div class="row">
                <div class="col-md-3">
                    <input type="text" id="name" class="form-control" placeholder="Product Name">
                </div>
                <div class="col-md-3">
                    <input type="number" id="price" class="form-control" placeholder="Price">
                </div>
                <div class="col-md-3">
                    <input type="number" id="quantity" class="form-control" placeholder="Quantity">
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-primary w-100" onclick="saveProduct()">Save</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Table -->
    <table class="table table-bordered text-center">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>

</div>

<script>
    const API_URL = "http://localhost:8080/products";

    function loadProducts() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => displayProducts(data));
    }

    function displayProducts(products) {
        let rows = "";
        products.forEach(p => {
            rows += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>₹ ${p.price}</td>
                    <td>${p.quantity}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, ${p.quantity})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById("productTable").innerHTML = rows;
    }

    function saveProduct() {
        const id = document.getElementById("productId").value;
        const product = {
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            quantity: parseInt(document.getElementById("quantity").value)
        };

        if (id) {
            fetch(API_URL + "/" + id, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(product)
            }).then(() => loadProducts());
        } else {
            fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(product)
            }).then(() => loadProducts());
        }

        document.getElementById("productForm").reset();
    }

    function editProduct(id, name, price, quantity) {
        document.getElementById("productId").value = id;
        document.getElementById("name").value = name;
        document.getElementById("price").value = price;
        document.getElementById("quantity").value = quantity;
    }

    function deleteProduct(id) {
        fetch(API_URL + "/" + id, {method: "DELETE"})
            .then(() => loadProducts());
    }

    function searchProduct() {
        const text = document.getElementById("search").value.toLowerCase();
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const filtered = data.filter(p => p.name.toLowerCase().includes(text));
                displayProducts(filtered);
            });
    }

    window.onload = loadProducts;
</script>

</body>
</html>
